<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mafia City - ELITE PvP Simulator V12.3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0f0f0f;color:#eee;font-family:Arial;padding:20px}
h1{text-align:center;color:#f4c542}
.container{max-width:2300px;margin:auto;background:#1a1a1a;padding:20px;border-radius:10px}
.section-title{color:#ffcc00;margin-top:20px}
input,select{width:100%;padding:6px;margin-top:4px;border-radius:5px;border:none}
button{margin-top:6px;padding:6px;background:#f4c542;border:none;font-weight:bold;cursor:pointer;border-radius:6px}
.subtype-box{background:#151515;padding:8px;border-radius:6px;margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.stat-box{background:#181818;padding:8px;border-radius:6px;margin-top:8px}
canvas{margin-top:25px;background:#222;padding:10px;border-radius:8px}
hr{margin:25px 0;border:1px solid #333}
a, a:hover, a:active{color:white!important;text-decoration:none;}
</style>
</head>
<body>

<h1>📅 ARCHIPEL CLAN MAFIA CITY</h1>

<h2>🔥 Advanced PvP Simulator 🇮🇹</h2>
<h3 style="color:white!important;text-decoration:none;"><a href="pvp-simulator.html">🇫🇷</a> - <a href="pvp-simulator-uk.html">🇬🇧</a> - <a href="pvp-simulator-de.html">🇩🇪</a> - <a href="pvp-simulator-es.html">🇪🇸</a> - <a href="pvp-simulator-tr.html">🇹🇷</a> - <a href="pvp-simulator-it.html">🇮🇹</a></h3>

<nav>
<ul style="text-decoration:none!important">
<li style ="list-style:none"><h4>Menu</h4></li>
<li><a href="index.html"style="color:white;text-decoration:none!important">⚔️ Strategia dell'arcipelago</a></li>
<li><a href="guide-complet.html"style="color:white;text-decoration:none!important">⚔️ Guida di aiuto</a></li>
<li><a href="composition-troupe.html" style="color:white;text-decoration:none!important">⚔️ Composizione della troupe</a></li>
<li><a href="calcul-troupe-raid.html" style="color:white;text-decoration:none!important">⚔️ Composizione delle truppe d'incursione</a></li>
<li><a href="pvp-simulator.html" style="color:white;text-decoration:none!important">⚔️ Confronto PvP</a></li>
</ul>
</nav>

<div class="container">

<label>⚔️ Modalità di combattimento</label>
<select id="mode">
<option value="cop">Cop</option>
<option value="governor">Governor</option>
<option value="clanwar">Clan War</option>
</select>

<div class="grid2">
<div id="left"></div>
<div id="right"></div>
</div>

<hr>
<button onclick="simulate()">SIMULARE</button>

<div id="result"></div>
<div id="losses"></div>

<canvas id="powerChart"></canvas>
<canvas id="pieYou"></canvas>
<canvas id="pieEnemy"></canvas>

</div>

<script>

/* ================= LISTES COMPLETES ================= */

const heroes=[
"Jeanne","Karina","Diana","Crook","Boss","Ares","Firelord","Shadow",
"Bloody Mary","Black Rose","Yama","Ironfist","Reaper","Ghost",
"Viper","Panther","Thunder","Falcon","Tyrant","Mad Dog",
"Poison Ivy","Razor","Scarlet","Frost","Blaze","Hawk",
"Wolf","Tiger","Eagle","Bear","Bull","Rhino","Cobra",
"Kraken","Medusa","Phoenix","Hydra","Cerberus",
"Valkyrie","Spartan","Samurai","Ninja","Ronin",
"Warlord","Berserker",
"Sniper Queen","Shooter King","Rider Queen","Bruiser King",
"Grace","Catherine","Hanano","Mai","Sherry","Violet","Dino","Merlin"
];

const renegades=[
"Benjamin","Celeste","Claudia","Cmdre Corax","Crazy Tornado",
"Deathweaver","Devil Ray","Dolores","Donnarossa","Drowner",
"Gabi","Jair","Jayden","Keith","Kit","Kraken",
"Lady Cunning","Lady Merry-Jay","Lan Quing",
"Legendary Goro","Legendary Ichiban","Legendary Kazuma",
"Lion Fist","Logan Steelwill","Luiz","Megalodon",
"Nereus","Oscar","Ramona","Randy","Sensei",
"Silver Fox","Stark","Storm Tamer","Tammy",
"The Croc","The Detective","The Duchess","The Eagle",
"The Ghosteye","The Mechanic","The Navigator",
"The Puppeteer","The Undertaker","Yasha","Ziyad"
];

const animals=[
"Lion","Tiger","Wolf","Eagle","Panther","Falcon",
"Bear","Rhino","Cobra",
"Griffe Déchirante","Aile de la Mort","Mâchoire Rugissante"
];

/* ================= VEHICULES ================= */

const vehicles={
"Black Beauty":{cost:296},
"Ladybug":{cost:1312},
"White Shadow":{cost:3584},
"Icy Babe":{cost:5376},
"Flash Rider":{cost:8480},
"Knight":{cost:8204},
"Ignite":{cost:41218},
"White Devil":{cost:589848},
"Twilight Blade":{cost:1163264},
"Hellfire":{cost:3244032},
"Poison Ivy":{cost:3801088}
};

/* ================= PARAM ================= */

const tierMult={6:0.6,7:0.7,8:0.8,9:0.9,10:1,11:1.15,12:1.35,13:1.6};

const troopTypes={
riders:["Motards","Pilotes"],
shooters:["Snipers","Automatiques"],
bruisers:["Gardes","Mercenaires"]
};

/* ================= BUILD UI ================= */

function buildSide(side,label){
return `
<h2 class="section-title">${label}</h2>

<label>🏛 Maniero (max 37)</label>
<input type="number" id="manor_${side}" value="30" min="1" max="37">

<h3>🚗 Veicolo sponsor</h3>
<select id="vehicle_${side}">
<option value="">Nessuno</option>
${Object.keys(vehicles).map(v=>`<option>${v}</option>`).join("")}
</select>

<h3>Eroi (ordine = Attacco / Difesa / Supporto)</h3>
<select id="hero_${side}_1"><option value="">Nessuno</option>${heroes.map(h=>`<option>${h}</option>`).join("")}</select>
<select id="heroStar_${side}_1"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="hero_${side}_2"><option value="">Nessuno</option>${heroes.map(h=>`<option>${h}</option>`).join("")}</select>
<select id="heroStar_${side}_2"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="hero_${side}_3"><option value="">Nessuno</option>${heroes.map(h=>`<option>${h}</option>`).join("")}</select>
<select id="heroStar_${side}_3"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<h3>Rinnegati (ordine = Attacco / Difesa / Supporto))</h3>
<select id="renegade_${side}_1"><option value="">Nessuno</option>${renegades.map(r=>`<option>${r}</option>`).join("")}</select>
<select id="renStar_${side}_1"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="renegade_${side}_2"><option value="">Nessuno</option>${renegades.map(r=>`<option>${r}</option>`).join("")}</select>
<select id="renStar_${side}_2"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="renegade_${side}_3"><option value="">Nessuno</option>${renegades.map(r=>`<option>${r}</option>`).join("")}</select>
<select id="renStar_${side}_3"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<h3>Animali (ordine = Attacco / Difesa / Supporto)</h3>
<select id="animal_${side}_1"><option value="">Nessuno</option>${animals.map(a=>`<option>${a}</option>`).join("")}</select>
<select id="aniStar_${side}_1"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="animal_${side}_2"><option value="">Nessuno</option>${animals.map(a=>`<option>${a}</option>`).join("")}</select>
<select id="aniStar_${side}_2"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<select id="animal_${side}_3"><option value="">Nessuno</option>${animals.map(a=>`<option>${a}</option>`).join("")}</select>
<select id="aniStar_${side}_3"><option value="1">1⭐</option><option value="2">2⭐</option><option value="3">3⭐</option><option value="4">4⭐</option><option value="5">5⭐</option></select>

<h3>Stats (%)</h3>
<div class="stat-box">
Riders ATK <input type="number" id="atk_riders_${side}" value="100">
DEF <input type="number" id="def_riders_${side}" value="100">
DMG <input type="number" id="dmg_riders_${side}" value="100"><br>
Shooters ATK <input type="number" id="atk_shooters_${side}" value="100">
DEF <input type="number" id="def_shooters_${side}" value="100">
DMG <input type="number" id="dmg_shooters_${side}" value="100"><br>
Bruisers ATK <input type="number" id="atk_bruisers_${side}" value="100">
DEF <input type="number" id="def_bruisers_${side}" value="100">
DMG <input type="number" id="dmg_bruisers_${side}" value="100">
</div>

<h3>Truppe</h3>
<div id="troops_${side}"></div>
`;
}

// Création des colonnes
left.innerHTML=buildSide("you","⚔️ VOUS");
right.innerHTML=buildSide("enemy","🎯 ENNEMI");

/* ================= TROUPE ================= */

function addSubtype(side,type){
let div=document.createElement("div");
div.className="subtype-box";
div.innerHTML=`
<select>${troopTypes[type].map(t=>`<option>${t}</option>`).join("")}</select>
<input type="number" value="100000">
<select>
<option value="6">T6</option><option value="7">T7</option>
<option value="8">T8</option><option value="9">T9</option>
<option value="10">T10</option><option value="11">T11</option>
<option value="12">T12</option><option value="13">T13</option>
</select>`;
document.getElementById(side+"_"+type).appendChild(div);
}

function buildTroops(side){
for(let type in troopTypes){
document.getElementById("troops_"+side).innerHTML+=
`<h4>${type.toUpperCase()}</h4>
<div id="${side}_${type}"></div>
<button onclick="addSubtype('${side}','${type}')">Ajouter</button>`;
troopTypes[type].forEach(()=>addSubtype(side,type));
}
}

buildTroops("you");
buildTroops("enemy");

/* ================= BONUS ================= */

function computeBonusHeroes(side){
let bonusAtt=0,bonusDef=0,bonusSup=0;
for(let i=1;i<=3;i++){
let name=document.getElementById(`hero_${side}_${i}`).value;
let star=parseInt(document.getElementById(`heroStar_${side}_${i}`).value)||0;
if(i===1) bonusAtt+=star*0.04;
if(i===2) bonusDef+=star*0.03;
if(i===3) bonusSup+=star*0.02;
}
return {att:bonusAtt,def:bonusDef,sup:bonusSup};
}

function computeBonusRenegades(side){
let bonusAtt=0,bonusDef=0,bonusSup=0;
for(let i=1;i<=3;i++){
let star=parseInt(document.getElementById(`renStar_${side}_${i}`).value)||0;
if(i===1) bonusAtt+=star*0.03;
if(i===2) bonusDef+=star*0.02;
if(i===3) bonusSup+=star*0.015;
}
return {att:bonusAtt,def:bonusDef,sup:bonusSup};
}

function computeBonusAnimals(side){
let bonusAtt=0,bonusDef=0,bonusSup=0;
for(let i=1;i<=3;i++){
let star=parseInt(document.getElementById(`aniStar_${side}_${i}`).value)||0;
if(i===1) bonusAtt+=star*0.03;
if(i===2) bonusDef+=star*0.02;
if(i===3) bonusSup+=star*0.015;
}
return {att:bonusAtt,def:bonusDef,sup:bonusSup};
}

/* ================= SIMULATION ================= */

function simulate(){

let mode=document.getElementById("mode").value;
let modeAtk=1,modeDef=1;
if(mode==="governor"){modeAtk=0.95;modeDef=1.10;}
if(mode==="clanwar"){modeAtk=1.10;modeDef=1;}

function compute(side,isAttacker){

let manor=parseFloat(document.getElementById("manor_"+side).value);
if(manor>37) manor=37; if(manor<1) manor=1;
let manorBonus=manor*0.005;

let classes={riders:0,shooters:0,bruisers:0};

for(let c in classes){
let atk=parseFloat(document.getElementById(`atk_${c}_${side}`).value)/100;
let def=parseFloat(document.getElementById(`def_${c}_${side}`).value)/100;
let dmg=parseFloat(document.getElementById(`dmg_${c}_${side}`).value)/100;

document.querySelectorAll(`#${side}_${c} .subtype-box`).forEach(box=>{
let count=parseFloat(box.children[1].value);
let tier=parseInt(box.children[2].value);
let base=count*tierMult[tier];
let power=base*(atk+def+dmg)/3;

// Bonus héros/renegats/animals
let heroBonus=computeBonusHeroes(side);
let renBonus=computeBonusRenegades(side);
let aniBonus=computeBonusAnimals(side);

power*=1+heroBonus.att+renBonus.att+aniBonus.att+manorBonus;

classes[c]+=power;
});
}

let vehicleName=document.getElementById("vehicle_"+side).value;
let vehiclePower=vehicleName?vehicles[vehicleName].cost:0;

let total=classes.riders+classes.shooters+classes.bruisers+vehiclePower;

if(isAttacker) total*=modeAtk;
else total*=modeDef;

return {classes,total};
}

let you=compute("you",true);
let enemy=compute("enemy",false);

/* Counter */
if(enemy.shooters>enemy.bruisers) you.classes.riders*=1.2;
if(enemy.bruisers>enemy.riders) you.classes.shooters*=1.2;
if(enemy.riders>enemy.shooters) you.classes.bruisers*=1.2;

let totalYou=you.total;
let totalEnemy=enemy.total;

let prob=(totalYou/(totalYou+totalEnemy))*100;
let ratio=totalEnemy/totalYou;
let lossYou=Math.min(ratio*50,90);
let lossEnemy=Math.min((1/ratio)*50,90);

result.innerHTML=
`<h3>VOI : ${Math.round(totalYou)}</h3>
<h3>EnneNemicomi : ${Math.round(totalEnemy)}</h3>
<h3>Probabilité victoire : ${prob.toFixed(1)}%</h3>`;

losses.innerHTML=
`<h3>Perdite stimate</h3>
VOI ≈ ${lossYou.toFixed(1)}%<br>
Nemico ≈ ${lossEnemy.toFixed(1)}%`;

/* Charts */
if(window.barChart)barChart.destroy();
barChart=new Chart(powerChart,{
type:"bar",
data:{labels:["VOI","Nemico"],
datasets:[{label:"Potenza totale",data:[totalYou,totalEnemy]}]}
});

if(window.pieY)pieY.destroy();
pieY=new Chart(pieYou,{
type:"pie",
data:{labels:["Riders","Shooters","Bruisers"],
datasets:[{data:[you.classes.riders,you.classes.shooters,you.classes.bruisers]}]}
});

if(window.pieE)pieE.destroy();
pieE=new Chart(pieEnemy,{
type:"pie",
data:{labels:["Riders","Shooters","Bruisers"],
datasets:[{data:[enemy.classes.riders,enemy.classes.shooters,enemy.classes.bruisers]}]}
});

}
</script>
</body>
</html>
