function buildManorOptions(){
let html="";
for(let i=1;i<=34;i++){
html+=`<option value="${i}">${i}</option>`;
}
html+=`<option value="35">35</option>`;
for(let p=10;p<=90;p+=10){
html+=`<option value="35_${p}">35 + ${p}%</option>`;
}
html+=`<option value="36">36</option>`;
for(let p=10;p<=90;p+=10){
html+=`<option value="36_${p}">36 + ${p}%</option>`;
}
html+=`<option value="37">37</option>`;
return html;
}

function getManorData(value){

const basePower={
1:27,5:534,10:4761,20:46527,
30:233280,31:268272,32:321926,
33:386311,34:463574,35:556288,
36:1193085,37:2505479
};

let level=parseInt(value);
let percent=0;

if(value.includes("_")){
let parts=value.split("_");
level=parseInt(parts[0]);
percent=parseInt(parts[1]);
}

let power=basePower[level]||0;

/* bonus puissance % sur palier */
if(percent>0){
power*=1+(percent/100);
}

/* debuffs */
let atkDebuff=0;
let defDebuff=0;

if(level===35){
atkDebuff = percent/100; // 10% → 0.10 etc
}

if(level===36){
atkDebuff = 0.10 + (percent/100);
defDebuff = 0.15;
}

if(level===37){
atkDebuff = 0.20;
defDebuff = 0.30;
}

return {power,atkDebuff,defDebuff};
}

function updatePiece(side,slot){

let set=document.getElementById(`${side}_${slot}_set`).value;
let pieceSelect=document.getElementById(`${side}_${slot}_piece`);
pieceSelect.innerHTML="";

if(!set) return;

let pieces=equipmentSets[set].pieces[slot];

Object.keys(pieces).forEach(name=>{
pieceSelect.innerHTML+=`<option value="${name}">${name}</option>`;
});

}

function computeEquipment(side){

let bonuses={};
let setCount={};

equipmentSlots.forEach(slot=>{

let set=document.getElementById(`${side}_${slot}_set`).value;
let piece=document.getElementById(`${side}_${slot}_piece`).value;
let reinforce=parseInt(document.getElementById(`${side}_${slot}_reinforce`).value);

if(!set || !piece) return;

if(!setCount[set]) setCount[set]=0;
setCount[set]++;

let data=equipmentSets[set].pieces[slot][piece] 
|| equipmentSets[set].pieces[slot]["unique"];

for(let stat in data){

let base=data[stat];
let value=base*(1+reinforce/20);

if(!bonuses[stat]) bonuses[stat]=0;
bonuses[stat]+=value;

}

});

// bonus de set
for(let set in setCount){

let count=setCount[set];
let bonusSet=equipmentSets[set].bonusSet;

for(let threshold in bonusSet){
if(count>=threshold){
for(let stat in bonusSet[threshold]){
if(!bonuses[stat]) bonuses[stat]=0;
bonuses[stat]+=bonusSet[threshold][stat];
}
}
}

}

return bonuses;
}




/* ================= SIMULATION ================= */

function simulate(){

let mode=document.getElementById("mode").value;
let modeAtk=1,modeDef=1;
if(mode==="governor"){modeAtk=0.95;modeDef=1.10;}
if(mode==="clanwar"){modeAtk=1.10;modeDef=1;}

function compute(side,isAttacker){

let manorValue=document.getElementById("manor_"+side).value;
let manorData=getManorData(manorValue);

let equipBonus=computeEquipment(side);

let classes={riders:0,shooters:0,bruisers:0};

// Bonus globaux
let heroBonus=computeBonusHeroes(side);
let renBonus=computeBonusRenegades(side);
let aniBonus=computeBonusAnimals(side);

for(let c in classes){

let atk=parseFloat(document.getElementById(`atk_${c}_${side}`).value)/100;
let def=parseFloat(document.getElementById(`def_${c}_${side}`).value)/100;
let dmg=parseFloat(document.getElementById(`dmg_${c}_${side}`).value)/100;

document.querySelectorAll(`#${side}_${c} .subtype-box`).forEach(box=>{

let count=parseFloat(box.children[1].value)||0;
let tier=parseInt(box.children[2].value)||6;

let base=count*tierMult[tier];
let power=base*(atk+def+dmg)/3;

/* ===== Bonus héros ===== */
power*=1+heroBonus.att+renBonus.att+aniBonus.att;

/* ===== Bonus équipement global ===== */
power*=1+((equipBonus.atk_troops||0)/100);

/* ===== Bonus équipement par classe ===== */
if(c==="riders"){
power*=1+((equipBonus.atk_riders||0)/100);
power*=1+((equipBonus.dmg_riders||0)/100);
}

if(c==="shooters"){
power*=1+((equipBonus.atk_shooters||0)/100);
}

if(c==="bruisers"){
power*=1+((equipBonus.atk_bruisers||0)/100);
}

/* ===== Bonus véhicules ===== */
if(c==="riders"){
power*=1+((equipBonus.atk_vehicle||0)/100);
}

classes[c]+=power;

});
}

let vehicleName=document.getElementById("vehicle_"+side).value;
let vehiclePower=vehicleName?vehicles[vehicleName].cost:0;

let totalClasses=classes.riders+classes.shooters+classes.bruisers;
let total=totalClasses+vehiclePower;

/* Manoir */
total+=manorData.power;

/* Mode combat */
if(isAttacker) total*=modeAtk;
else total*=modeDef;

return {classes,total,vehiclePower,manorData};
}

/* ===== Calcul des deux camps ===== */

let you=compute("you",true);
let enemy=compute("enemy",false);

/* ================= COUNTER SYSTEM ================= */

if(enemy.classes.shooters>enemy.classes.bruisers) you.classes.riders*=1.2;
if(enemy.classes.bruisers>enemy.classes.riders) you.classes.shooters*=1.2;
if(enemy.classes.riders>enemy.classes.shooters) you.classes.bruisers*=1.2;

/* Recalcul total après counter */
you.total = you.classes.riders + you.classes.shooters + you.classes.bruisers + you.vehiclePower + you.manorData.power;
enemy.total = enemy.classes.riders + enemy.classes.shooters + enemy.classes.bruisers + enemy.vehiclePower + enemy.manorData.power;

/* ================= DEBUFF MANOIR ================= */

you.total *= 1 - enemy.manorData.atkDebuff;
enemy.total *= 1 - you.manorData.atkDebuff;

you.total *= 1 - enemy.manorData.defDebuff;
enemy.total *= 1 - you.manorData.defDebuff;

/* ================= RESULTATS ================= */

let totalYou=you.total;
let totalEnemy=enemy.total;

let prob=(totalYou/(totalYou+totalEnemy))*100;
let ratio=totalEnemy/totalYou;
let lossYou=Math.min(ratio*50,90);
let lossEnemy=Math.min((1/ratio)*50,90);

result.innerHTML=
`<h3>Vous : ${Math.round(totalYou)}</h3>
<h3>Ennemi : ${Math.round(totalEnemy)}</h3>
<h3>Probabilité victoire : ${prob.toFixed(1)}%</h3>`;

losses.innerHTML=
`<h3>Pertes estimées</h3>
Vous ≈ ${lossYou.toFixed(1)}%<br>
Ennemi ≈ ${lossEnemy.toFixed(1)}%`;

/* Charts */
if(window.barChart)barChart.destroy();
barChart=new Chart(powerChart,{
type:"bar",
data:{labels:["Vous","Ennemi"],
datasets:[{label:"Puissance Totale",data:[totalYou,totalEnemy]}]}
});

if(window.pieY)pieY.destroy();
pieY=new Chart(pieYou,{
type:"pie",
data:{labels:["Riders","Shooters","Bruisers"],
datasets:[{data:[you.classes.riders,you.classes.shooters,you.classes.bruisers]}]}
});
