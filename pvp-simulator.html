<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mafia City - Advanced Battle Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f0f0f;color:#eee;font-family:Arial;padding:20px}
h1{text-align:center;color:#f4c542}
.container{max-width:1300px;margin:auto;background:#1a1a1a;padding:20px;border-radius:10px}
.section-title{color:#ffcc00;margin-top:25px}
input,select{width:100%;padding:6px;margin-top:4px;border-radius:5px;border:none}
button{margin-top:10px;padding:8px;background:#f4c542;border:none;font-weight:bold;cursor:pointer;border-radius:6px}
.subtype-box{background:#151515;padding:10px;border-radius:6px;margin-top:10px}
canvas{margin-top:20px;background:#222;padding:10px;border-radius:8px}
.good{color:#4dff88}
.medium{color:#ffaa00}
.bad{color:#ff4d4d}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:30px}
</style>
</head>
<body>

<h1>📅 ARCHIPEL CLAN MAFIA CITY</h1>
<h2>🔥 Advanced PvP Simulator</h2>

<div class="container">

<div class="grid">

<div>
<h2 class="section-title">👑 VOUS</h2>
<div id="you_classes"></div>
</div>

<div>
<h2 class="section-title">🎯 ENNEMI</h2>
<div id="enemy_classes"></div>
</div>

</div>

<button onclick="simulate()">Simuler Combat</button>

<div id="result"></div>

<canvas id="battleChart"></canvas>

</div>

<script>

const tierMult={6:0.55,7:0.65,8:0.75,9:0.85,10:1,11:1.15,12:1.35,13:1.6};

const classes={
biker:["Motard","Pilote de moto"],
shooter:["Tireur d'élite","Tireur automatique"],
bulker:["Garde","Mercenaire"],
vehicle:["Véhicule blindé","Véhicule modifié"]
};

const counterMatrix={
biker:{shooter:1.15,bulker:0.85,vehicle:1,biker:1},
shooter:{vehicle:1.15,biker:0.85,bulker:1,shooter:1},
vehicle:{bulker:1.15,shooter:0.85,biker:1,vehicle:1},
bulker:{biker:1.15,vehicle:0.85,shooter:1,bulker:1}
};

function buildSide(prefix,containerId){

const container=document.getElementById(containerId);

for(let c in classes){

let block=document.createElement("div");
block.innerHTML=`<h3 class="section-title">${c.toUpperCase()}</h3>
<div id="${prefix}_${c}_container"></div>
<button onclick="addSubtype('${prefix}','${c}')">➕ Ajouter</button>`;
container.appendChild(block);

classes[c].forEach(t=>addSubtype(prefix,c,t));
}
}

function addSubtype(prefix,className,typeForced=null){

const container=document.getElementById(prefix+"_"+className+"_container");

let div=document.createElement("div");
div.className="subtype-box";

div.innerHTML=`
<label>Type</label>
<select class="typeSelect">
${classes[className].map(t=>`<option>${t}</option>`).join("")}
</select>
<label>Nombre</label>
<input type="number" class="countInput" value="0">
<label>Tier</label>
<select class="tierSelect">
<option value="6">T6</option><option value="7">T7</option>
<option value="8">T8</option><option value="9">T9</option>
<option value="10">T10</option><option value="11">T11</option>
<option value="12">T12</option><option value="13">T13</option>
</select>
`;

container.appendChild(div);

if(typeForced){
div.querySelector(".typeSelect").value=typeForced;
}
}

let battleChart;

function simulate(){

let yourTotals={},enemyTotals={};

for(let c in classes){
yourTotals[c]=0;
enemyTotals[c]=0;

document.querySelectorAll(`#you_${c}_container .subtype-box`).forEach(box=>{
let count=+box.querySelector(".countInput").value;
let tier=+box.querySelector(".tierSelect").value;
yourTotals[c]+=count*tierMult[tier];
});

document.querySelectorAll(`#enemy_${c}_container .subtype-box`).forEach(box=>{
let count=+box.querySelector(".countInput").value;
let tier=+box.querySelector(".tierSelect").value;
enemyTotals[c]+=count*tierMult[tier];
});
}

let totalEnemyAll=Object.values(enemyTotals).reduce((a,b)=>a+b,0);

let adjustedYourPower=0;
let enemyPower=totalEnemyAll;

for(let att in yourTotals){

let counterEffect=0;

for(let def in enemyTotals){

let proportion=enemyTotals[def]/(totalEnemyAll||1);
let multiplier=counterMatrix[att][def]||1;
counterEffect+=proportion*(multiplier-1);
}

adjustedYourPower+=yourTotals[att]*(1+counterEffect);
}

let ratio=adjustedYourPower/(enemyPower||1);

let verdict=ratio>1.1?"<span class='good'>Victoire probable</span>":
ratio>0.9?"<span class='medium'>Combat serré</span>":
"<span class='bad'>Défaite probable</span>";

document.getElementById("result").innerHTML=
"<h3>Votre puissance ajustée : "+Math.round(adjustedYourPower)+"</h3>"+
"<h3>Puissance ennemie : "+Math.round(enemyPower)+"</h3>"+
verdict+
"<br><br>Ratio : "+ratio.toFixed(2);

if(battleChart)battleChart.destroy();
battleChart=new Chart(document.getElementById("battleChart"),{
type:'bar',
data:{
labels:["Vous","Ennemi"],
datasets:[{
data:[adjustedYourPower,enemyPower],
backgroundColor:["#44ff88","#ff4444"]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{ticks:{color:"#fff"}},
y:{ticks:{color:"#fff"}}
}
}
});
}

buildSide("you","you_classes");
buildSide("enemy","enemy_classes");

</script>

</body>
</html>
