<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ultimate Raid Calculator - Mafia City</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(#0f0f0f,#1a1a1a);
    color: #eee;
    padding: 20px;
}
h1 { text-align:center; color:#f4c542; }
.container {
    max-width:1200px;
    margin:auto;
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
}
.section-title { margin-top:25px; color:#ffcc00; }
input, select {
    width:100%; padding:6px; margin-top:4px;
    border-radius:5px; border:none;
}
button {
    margin-top:10px;
    padding:8px;
    background:#f4c542;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}
.subtype-box {
    background:#151515;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
}
canvas {
    background:#222;
    margin-top:20px;
    padding:10px;
    border-radius:8px;
}
.good{color:#4dff88;}
.medium{color:#ffaa00;}
.bad{color:#ff4d4d;}
</style>
</head>
<body>

<h1>📅 ARCHIPEL CLAN MAFIA CITY</h1>
<h2>🔥 Ultimate Composition Calculator</h2>

<nav>
<ul style="text-decoration:none!important">
<li style="list-style:none"><h4>Menu</h4></li>
<li><a href="index.html" style="color:white;text-decoration:none!important">⚔️ Archipel Stratégie</a></li>
<li><a href="guide-complet.html" style="color:white;text-decoration:none!important">⚔️ Aide guide</a></li>
<li><a href="composition-troupe.html" style="color:white;text-decoration:none!important">⚔️ Composition de troupe</a></li>
<li><a href="calcul-troupe-raid.html" style="color:white;text-decoration:none!important">⚔️ Composition de troupe raid</a></li>
<li><a href="pvp-simulator.html" style="color:white;text-decoration:none!important">⚔️ comparatif PvP</a></li>
</ul>
</nav>

<p>Analyse avancée de votre composition globale.</p>

<div class="container">

<h2 class="section-title">📊 Troupes</h2>
<div id="classesContainer"></div>

<h2 class="section-title">📈 Bonus (%)</h2>
<label>ATK</label><input type="number" id="atkBonus" value="150">
<label>DEF</label><input type="number" id="defBonus" value="120">
<label>DMG</label><input type="number" id="dmgBonus" value="80">

<button onclick="calculate()">Analyser</button>

<div id="result"></div>

<canvas id="pieChart"></canvas>
<canvas id="barChart"></canvas>
<canvas id="radarChart"></canvas>

</div>

<script>

const tierMult={6:0.55,7:0.65,8:0.75,9:0.85,10:1,11:1.15,12:1.35,13:1.6};

const classes={
biker:["Motard","Pilote de moto"],
shooter:["Tireur d'élite","Tireur automatique"],
bulker:["Garde","Mercenaire"],
vehicle:["Véhicule blindé","Véhicule modifié"]
};

function createUI(){
const container=document.getElementById("classesContainer");
for(let c in classes){
let block=document.createElement("div");
block.innerHTML=`<h3 class="section-title">${c.toUpperCase()}</h3>
<div id="${c}_container"></div>
<button onclick="addSubtype('${c}')">➕ Ajouter</button>`;
container.appendChild(block);
classes[c].forEach(t=>addSubtype(c,t));
}
}

function addSubtype(className,typeForced=null){
const box=document.createElement("div");
box.className="subtype-box";
box.innerHTML=`
<select class="typeSelect">
${classes[className].map(t=>`<option>${t}</option>`).join("")}
</select>
<input type="number" class="countInput" placeholder="Nombre" value="0">
<select class="tierSelect">
<option value="6">T6</option><option value="7">T7</option>
<option value="8">T8</option><option value="9">T9</option>
<option value="10">T10</option><option value="11">T11</option>
<option value="12">T12</option><option value="13">T13</option>
</select>`;
document.getElementById(className+"_container").appendChild(box);
if(typeForced) box.querySelector(".typeSelect").value=typeForced;
}

let pieChart,barChart,radarChart;

function calculate(){

let atk=+atkBonus.value;
let def=+defBonus.value;
let dmg=+dmgBonus.value;

let totals={},powers={},totalPower=0,totalCount=0;

for(let c in classes){
let sub=document.querySelectorAll(`#${c}_container .subtype-box`);
let cCount=0,cPower=0;

sub.forEach(box=>{
let count=+box.querySelector(".countInput").value;
let tier=+box.querySelector(".tierSelect").value;
let weighted=((atk/100)*0.45)+((dmg/100)*0.35)+((def/100)*0.20);
let power=count*tierMult[tier]*(1+weighted);
cCount+=count;
cPower+=power;
});

totals[c]=cCount;
powers[c]=cPower;
totalPower+=cPower;
totalCount+=cCount;
}

let ratioBulker=totals["bulker"]/totalCount;
let advice=ratioBulker<0.2?"⚠️ Défense faible":
ratioBulker<0.3?"⚖️ Défense correcte":"🛡️ Défense solide";

document.getElementById("result").innerHTML=
"<h3>Puissance Totale : "+Math.round(totalPower)+"</h3>"+advice;

updateCharts(totals,powers,atk,def,dmg);
}

function updateCharts(totals,powers,atk,def,dmg){

if(pieChart)pieChart.destroy();
pieChart=new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{labels:Object.keys(totals),
datasets:[{data:Object.values(totals),
backgroundColor:["#ff4444","#44aaff","#44ff88","#ffaa00"]}]}
});

if(barChart)barChart.destroy();
barChart=new Chart(document.getElementById("barChart"),{
type:'bar',
data:{labels:Object.keys(powers),
datasets:[{label:"Puissance",data:Object.values(powers),
backgroundColor:"#f4c542"}]}
});

if(radarChart)radarChart.destroy();
radarChart=new Chart(document.getElementById("radarChart"),{
type:'radar',
data:{
labels:["ATK","DEF","DMG"],
datasets:[{
label:"Stat Balance",
data:[atk,def,dmg],
backgroundColor:"rgba(244,197,66,0.3)",
borderColor:"#f4c542"
}]
}
});
}

createUI();

</script>
</body>
</html>
